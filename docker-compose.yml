services:
  postgres:
    image: postgres:16-alpine
    container_name: security-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-security_analytics}
      POSTGRES_USER: ${POSTGRES_USER:-security_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-security_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-security_user} -d ${POSTGRES_DB:-security_analytics}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - security-net

  redis:
    image: redis:7-alpine
    container_name: security-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - security-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: security-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-security_user}:${POSTGRES_PASSWORD:-security_pass}@postgres:5432/${POSTGRES_DB:-security_analytics}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      DEBUG: ${DEBUG:-true}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - security-net

  backend-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: security-backend-worker
    command: ["uv", "run", "python", "worker.py"]
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-security_user}:${POSTGRES_PASSWORD:-security_pass}@postgres:5432/${POSTGRES_DB:-security_analytics}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - security-net

  sniffer:
    build:
      context: ./sniffer
      dockerfile: Dockerfile
    container_name: security-sniffer
    environment:
      REDIS_URL: redis://redis:6379/0
      INTERFACE: ${INTERFACE:-any}
      SIMULATION_MODE: ${SIMULATION_MODE:-auto}
      PACKET_BATCH_SIZE: ${PACKET_BATCH_SIZE:-100}
    depends_on:
      redis:
        condition: service_healthy
    cap_add:
      - NET_ADMIN
      - NET_RAW
    network_mode: host

  ml-worker:
    build:
      context: ./ml-worker
      dockerfile: Dockerfile
    container_name: security-ml-worker
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-security_user}:${POSTGRES_PASSWORD:-security_pass}@postgres:5432/${POSTGRES_DB:-security_analytics}
      REDIS_URL: redis://redis:6379/0
      MODEL_UPDATE_INTERVAL: ${MODEL_UPDATE_INTERVAL:-300}
      ANOMALY_THRESHOLD: ${ANOMALY_THRESHOLD:-0.7}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./ml-worker:/app
      - ml_models:/app/models
    networks:
      - security-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: security-frontend
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_WS_URL: ws://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - security-net

volumes:
  postgres_data:
  redis_data:
  ml_models:

networks:
  security-net:
    driver: bridge